<section class="dashboard-shell">
  <header class="dashboard-header">
    <div>
      <p class="eyebrow">Panel de usuario</p>
      <h1>Bienvenido{{ session ? ', ' + session.name : '' }}</h1>
      <p class="subtitle">Administra tu cuenta y vuelve al muro para seguir ayudando a reunir mascotas con su familia.</p>
    </div>

    <div class="actions">
      <a routerLink="/" class="ghost-btn">Ir al sitio</a>
      <button type="button" class="action-btn" (click)="logout()">Salir</button>
    </div>
  </header>

  <section class="content-card">
    <h2>Accesos rapidos</h2>
    <div class="links">
      <a routerLink="/" class="link-card">Explorar mascotas</a>
      <a href="/#formulario" class="link-card">Publicar reporte</a>
      <a routerLink="/register" class="link-card">Crear nueva cuenta</a>
    </div>
  </section>
</section>
