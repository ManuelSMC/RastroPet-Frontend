<section class="auth-page">
  <div class="auth-card hero-copy">
    <p class="eyebrow">Acceso seguro</p>
    <h1>Inicia sesion en RastroPet</h1>
    <p class="subtitle">Entra con tu cuenta para administrar publicaciones o acceder a tu panel personal.</p>

    <form [formGroup]="loginForm" (ngSubmit)="submit()" novalidate>
      <label>
        <span>Correo</span>
        <input type="email" formControlName="email" placeholder="tu-correo@ejemplo.com" />
      </label>

      <label>
        <span>Contraseña</span>
        <input type="password" formControlName="password" placeholder="Ingresa tu contraseña" />
      </label>

      <button class="action-btn" type="submit" [disabled]="isSubmitting">
        {{ isSubmitting ? 'Ingresando...' : 'Entrar' }}
      </button>

      <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>
    </form>

    <div class="login-links">
      <a routerLink="/register">Crear cuenta nueva</a>
    </div>
  </div>
</section>
